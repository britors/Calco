app-id: br.com.w3ti.Calco
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: calco
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
modules:
  - name: calco
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - cargo build --release --locked
      - install -Dm755 target/release/calco /app/bin/calco
      - install -Dm644 data/br.com.w3ti.Calco.desktop /app/share/applications/br.com.w3ti.Calco.desktop
      - install -Dm644 data/br.com.w3ti.Calco.metainfo.xml /app/share/metainfo/br.com.w3ti.Calco.metainfo.xml
      - install -Dm644 data/application-x-calco.xml /app/share/mime/packages/application-x-calco.xml
      - install -Dm644 design/calco-icon-mark.svg /app/share/icons/hicolor/scalable/apps/br.com.w3ti.Calco.svg
    sources:
      - type: dir
        path: ..
